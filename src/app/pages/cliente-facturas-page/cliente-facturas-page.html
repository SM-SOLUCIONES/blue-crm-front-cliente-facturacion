@if (paginator(); as _paginator) {
  <bod-data-table
    #dt
    [dataSource]="_paginator"
    [columns]="columnas()"
    [rowActionsBuilder]="rowActionsBuilder"
  >
    <ng-template #caption>
      <bod-table-toolbar
        (searchChange)="dt.filterGlobal($event, 'contains')"
        [vistas]="vistas()"
        [selectedVista]="_paginator.uuidVista() ?? null"
        (selectedVistaChange)="onVistaChange($event)"
      />
    </ng-template>
  </bod-data-table>
}
